name: Generate PDFs

on:
  push:
    paths:
      - 'pr/**.html'
      - 'kontrol/**.html'
      - 'theory/**.html'
      - 'scripts/generate_all_pdfs.py'
      - 'umk-matematika.cls'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install LaTeX
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq texlive-latex-base texlive-latex-recommended texlive-latex-extra texlive-lang-cyrillic cm-super
    - name: Clean old files
      run: |
        rm -rf tex_all
        rm -rf pr/tex
        rm -rf pr/pdf
        mkdir -p tex_all
    - name: Generate LaTeX
      run: python scripts/generate_all_pdfs.py
    - name: Compile PDFs
      run: |
        cd tex_all
        for f in *.tex; do pdflatex -interaction=nonstopmode "$f" || true; done
        mkdir -p ../pdf_all
        cp *.pdf ../pdf_all/ 2>/dev/null || true
    - name: Commit PDFs
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'actions@github.com'
        git add pdf_all/ tex_all/
        git commit -m 'Auto PDFs' || echo "No changes"
        git push || echo "Push failed"
