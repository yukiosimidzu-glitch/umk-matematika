name: Generate PDFs

on:
  push:
    paths:
      - 'pr/**.html'
      - 'scripts/generate_pdf.py'
      - 'umk-matematika.cls'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install LaTeX (minimal)
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq texlive-latex-base texlive-latex-recommended texlive-latex-extra texlive-lang-cyrillic cm-super
        
    - name: Generate LaTeX files
      run: python scripts/generate_pdf.py
        
    - name: Compile PDFs
      run: |
        cp umk-matematika.cls pr/tex/
        cd pr/tex
        for f in *.tex; do
          pdflatex -interaction=nonstopmode -halt-on-error "$f" || echo "Error in $f"
        done
        mkdir -p ../pdf
        cp *.pdf ../pdf/ 2>/dev/null || true
        
    - name: Commit PDFs
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'actions@github.com'
        git add pr/pdf/ pr/tex/
        git commit -m 'Auto-generate PDFs' || echo "No changes to commit"
        git push || echo "Push failed"
